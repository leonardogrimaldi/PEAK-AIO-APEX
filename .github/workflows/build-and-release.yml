name: Build & Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild PEAK-AIO.sln /p:Configuration=Release /p:Platform="Any CPU" /restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PEAK-AIO
          path: PEAK-AIO/bin/Release/PEAK-AIO.dll

  prerelease:
    needs: build
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: PEAK-AIO

      - name: Get short SHA
        id: slug
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.slug.outputs.sha }}
          name: "Dev Build (${{ github.ref_name }} @ ${{ steps.slug.outputs.sha }})"
          files: PEAK-AIO.dll
          prerelease: true
          body: |
            Automated dev build from branch `${{ github.ref_name }}` at commit `${{ github.sha }}`.

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: PEAK-AIO

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PEAK-AIO.dll
          generate_release_notes: true
